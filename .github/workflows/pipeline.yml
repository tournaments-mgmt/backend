name: Pipeline
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build the Docker image
        run: docker image build . --file Dockerfile --target=prod --tag "tournaments-mgmt-backend:${GITHUB_REF}"
